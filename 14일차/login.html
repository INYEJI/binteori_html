<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "돋움", sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 10px solid lightblue;
      background-color: #f8f9fa;
    }

    .container {
      text-align: center;
      padding: 40px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background-color: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      min-width: 320px;
    }

    .logo img {
      max-width: 100px;
      max-height: 100px;
      margin-bottom: 20px;
    }

    .login {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .form-group {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .form-group label {
      width: 80px;
      text-align: right;
      margin-right: 10px;
      font-weight: bold;
    }

    .form-group input {
      padding: 5px;
      width: 200px;
    }

    .login input[type="submit"] {
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login input[type="submit"]:hover {
      background-color: #2980b9;
    }

    .close-btn {
      margin-top: 15px;
    }

    .close-btn button {
      padding: 6px 14px;
      border: 1px solid #ccc;
      background-color: #eee;
      cursor: pointer;
    }

    .close-btn button:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      <img src="https://i.pinimg.com/736x/2f/75/16/2f75167aeb437e7cbaf23c9d1ca99c97.jpg" alt="mainlogo">
    </div>

    <form method="post" action="#">
      <div class="login">
        <div class="form-group">
          <label for="userid">아이디:</label>
          <input type="text" name="id" id="userid" required>
        </div>
        <div class="form-group">
          <label for="userpwd">비밀번호:</label>
          <input type="password" name="pwd" id="userpwd" required>
        </div>
        <input type="submit" value="로그인">
      </div>
    </form>

    <div class="close-btn">
      <button onclick="window.close()">닫기</button>
    </div>
  </div>

</body>
</html>
